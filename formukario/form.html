<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Formulário de Elementos Químicos</title>
<script src="script.js"></script>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2>Cadastro de Elementos Químicos</h2>

<form>

<label>Nome do elemento:</label>
<input type="text" required>

<label>Símbolo químico:</label>
<input type="text" required>

<label>Número atômico:</label>
<input type="number" required>

<label>Classificação:</label>

<input type="radio" name="classificacao"> Metal<br>
<input type="radio" name="classificacao"> Ametal<br>
<input type="radio" name="classificacao"> Gás Nobre<br><br>

<label>Estado físico:</label>

<select>
<option>Sólido</option>
<option>Líquido</option>
<option>Gasoso</option>
</select>

<label>Observações:</label>

<textarea rows="4"></textarea>

<button type="submit">Cadastrar</button>
<button type="reset" class="reset">Limpar</button>

</form>

</div>

<div id="botao">
    <button onclick="alterarFundo()" type="button">Mudar Cor</button>
</div>

</body>
</html>
